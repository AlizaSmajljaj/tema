<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>λ Haskell AI Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:           #0d0f14;
      --bg-panel:     #111318;
      --bg-card:      #161920;
      --bg-card-h:    #1c2029;
      --border:       #222630;
      --border-mid:   #2a3040;
      --accent:       #7ee8a2;
      --accent-dim:   #4a9966;
      --accent-glow:  rgba(126,232,162,0.12);
      --purple:       #9d7aed;
      --red:          #f07878;
      --amber:        #f0b96e;
      --blue:         #6eb4f0;
      --txt:          #e8ecf0;
      --txt-dim:      #7a8598;
      --txt-muted:    #3d4a5c;
      --mono:         'Space Mono', monospace;
      --serif:        'Instrument Serif', serif;
      --sans:         'DM Sans', sans-serif;
      --r:            6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--txt); font-family: var(--sans); font-size: 13px; }

    /* ── Shell grid ─────────────────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: 48px 1fr 26px;
      grid-template-columns: 1fr 380px;
      height: 100vh;
      grid-template-areas: "tb tb" "ed pn" "sb sb";
    }

    /* ── Top bar ── */
    .tb {
      grid-area: tb;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0; padding: 0 20px;
    }
    .logo { display: flex; align-items: baseline; gap: 7px; margin-right: 24px; }
    .logo-lam {
      font-family: var(--serif); font-style: italic; font-size: 28px;
      color: var(--accent); line-height: 1; text-shadow: 0 0 24px var(--accent-glow);
    }
    .logo-name { font-family: var(--serif); font-style: italic; font-size: 17px; }
    .logo-ver  {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--txt-muted); align-self: center;
    }
    .tb-sep { width: 1px; height: 20px; background: var(--border-mid); margin: 0 18px; }

    /* Sample pill tabs */
    .pills { display: flex; gap: 4px; }
    .pill {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase;
      padding: 3px 11px; border-radius: 20px; border: 1px solid var(--border-mid);
      color: var(--txt-dim); background: none; cursor: pointer; transition: all 0.12s;
    }
    .pill:hover  { border-color: var(--accent-dim); color: var(--accent); }
    .pill.on     { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    .tb-r { margin-left: auto; display: flex; align-items: center; gap: 12px; }

    /* Connection badge */
    .badge { display: flex; align-items: center; gap: 6px; }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border-mid); transition: background 0.3s;
    }
    .badge-txt { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--txt-dim); transition: color 0.3s; }
    .badge.connected .badge-dot { background: var(--accent); box-shadow: 0 0 7px var(--accent); }
    .badge.connected .badge-txt { color: var(--accent); }
    .badge.compiling .badge-dot { background: var(--amber); animation: blink .7s infinite; }
    .badge.compiling .badge-txt { color: var(--amber); }
    .badge.err       .badge-dot { background: var(--red); }
    .badge.err       .badge-txt { color: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* Compile button */
    .btn-run {
      display: flex; align-items: center; gap: 7px;
      background: var(--accent); color: #071209; border: none;
      padding: 7px 18px; border-radius: var(--r);
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      cursor: pointer; transition: filter .15s, box-shadow .15s;
    }
    .btn-run:hover    { filter: brightness(1.1); box-shadow: 0 0 18px var(--accent-glow); }
    .btn-run:disabled { opacity: .35; cursor: default; filter: none; box-shadow: none; }

    /* ── Editor ── */
    .ed { grid-area: ed; position: relative; overflow: hidden; }
    .flash {
      position: absolute; inset: 0; pointer-events: none; z-index: 9;
      border: 2px solid transparent; opacity: 0;
    }
    .flash.go { animation: flashAnim .7s forwards; }
    @keyframes flashAnim {
      0%  { opacity: 1; border-color: var(--accent); box-shadow: inset 0 0 30px rgba(126,232,162,.07); }
      100%{ opacity: 0; border-color: transparent; }
    }
    #editor { width: 100%; height: 100%; }

    /* ── Panel ── */
    .pn {
      grid-area: pn; background: var(--bg-panel);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .pn-head {
      padding: 14px 18px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .pn-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    .pn-title { font-family: var(--serif); font-style: italic; font-size: 17px; }
    .pn-counts { font-family: var(--mono); font-size: 10px; display: flex; gap: 8px; }
    .ce { color: var(--red); }
    .cw { color: var(--amber); }
    .co { color: var(--accent); }

    /* Filter tabs */
    .ftabs { display: flex; gap: 2px; }
    .ft {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 3px; border: none;
      background: none; color: var(--txt-muted); cursor: pointer; transition: all .12s;
    }
    .ft:hover { color: var(--txt-dim); background: var(--bg-card); }
    .ft.on    { color: var(--txt); background: var(--bg-card); }

    /* Diag list */
    #dlist { flex: 1; overflow-y: auto; padding: 10px 12px; }
    #dlist::-webkit-scrollbar { width: 4px; }
    #dlist::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    /* Diag card */
    .dc {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 8px;
      cursor: pointer; overflow: hidden;
      transition: border-color .15s, background .15s;
      animation: slideIn .18s ease-out both;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .dc:nth-child(1){animation-delay:.00s} .dc:nth-child(2){animation-delay:.04s}
    .dc:nth-child(3){animation-delay:.08s} .dc:nth-child(4){animation-delay:.12s}
    .dc:nth-child(5){animation-delay:.16s}

    .dc:hover  { background: var(--bg-card-h); border-color: var(--border-mid); }
    .dc.active { border-color: var(--accent-dim); background: var(--bg-card-h); }
    .dc.active .dc-stripe { background: var(--accent) !important; }

    .dc.se .dc-stripe { background: var(--red); }
    .dc.sw .dc-stripe { background: var(--amber); }
    .dc.si .dc-stripe { background: var(--blue); }

    .dc-row  { display: flex; }
    .dc-stripe { width: 3px; flex-shrink: 0; border-radius: var(--r) 0 0 var(--r); transition: background .2s; }
    .dc-body { flex: 1; padding: 10px 12px; min-width: 0; }

    .dc-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
    .dc-sev {
      font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
      padding: 1px 6px; border-radius: 3px;
    }
    .se .dc-sev { background: rgba(240,120,120,.14); color: var(--red); }
    .sw .dc-sev { background: rgba(240,185,110,.14); color: var(--amber); }
    .si .dc-sev { background: rgba(110,180,240,.14); color: var(--blue); }
    .dc-loc { font-family: var(--mono); font-size: 10px; color: var(--txt-muted); }
    .dc-loc .ln { color: var(--txt-dim); }

    .dc-msg { font-family: var(--mono); font-size: 11px; color: var(--txt); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }

    /* AI drawer */
    .dc-ai { max-height: 0; overflow: hidden; border-top: 0 solid var(--border); transition: max-height .25s ease-out; }
    .dc.active .dc-ai { max-height: 320px; border-top-width: 1px; }
    .dc-ai-in { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    .ai-blk { display: flex; flex-direction: column; gap: 5px; }
    .ai-lbl {
      font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
      display: flex; align-items: center; gap: 5px;
    }
    .ai-lbl.exp { color: var(--purple); }
    .ai-lbl.hnt { color: var(--accent); }
    .ai-lbl::after { content:''; flex:1; height:1px; background: var(--border); }
    .ai-txt { font-family: var(--sans); font-size: 12px; font-weight: 300; color: var(--txt); line-height: 1.6; }

    /* Empty / success states */
    .state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 10px; text-align: center; }
    .state-lam { font-family: var(--serif); font-style: italic; font-size: 52px; color: var(--border-mid); line-height: 1; }
    .state-txt { font-family: var(--sans); font-size: 13px; color: var(--txt-muted); line-height: 1.5; }
    .state-sub { font-family: var(--mono); font-size: 10px; color: var(--border-mid); letter-spacing: .06em; }
    .state-ok  { font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--accent); text-shadow: 0 0 16px var(--accent-glow); }
    .state-ok-mark { font-size: 28px; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

    /* XP bar */
    .xpbar { padding: 10px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .xpbar-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--txt-muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .xpbar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .xpbar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border-radius: 2px; transition: width .6s cubic-bezier(.4,0,.2,1); width: 0%; }

    /* ── Status bar ── */
    .sb {
      grid-area: sb; background: var(--bg-panel); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 18px;
    }
    .sbi { font-family: var(--mono); font-size: 10px; color: var(--txt-muted); display: flex; align-items: center; gap: 5px; }
    .sbi .v    { color: var(--txt-dim); }
    .sbi.er .v { color: var(--red); }
    .sbi.wa .v { color: var(--amber); }
    .sb-sep { width: 1px; height: 12px; background: var(--border-mid); }
    .sb-r   { margin-left: auto; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
  </style>
</head>
<body>
<div class="shell">

  <!-- Top bar -->
  <header class="tb">
    <div class="logo">
      <span class="logo-lam">λ</span>
      <span class="logo-name">Haskell AI Tutor</span>
      <span class="logo-ver">v0.1</span>
    </div>
    <div class="tb-sep"></div>
    <div class="pills">
      <button class="pill on"  onclick="loadSnip('start',this)">Starter</button>
      <button class="pill" onclick="loadSnip('type',this)">Type Error</button>
      <button class="pill" onclick="loadSnip('scope',this)">Scope Error</button>
      <button class="pill" onclick="loadSnip('pat',this)">Patterns</button>
    </div>
    <div class="tb-r">
      <div class="badge" id="badge">
        <div class="badge-dot"></div>
        <span class="badge-txt" id="badge-txt">Connecting</span>
      </div>
      <button class="btn-run" id="runbtn" disabled>▶ Compile</button>
    </div>
  </header>

  <!-- Editor -->
  <div class="ed">
    <div class="flash" id="flash"></div>
    <div id="editor"></div>
  </div>

  <!-- Panel -->
  <aside class="pn">
    <div class="pn-head">
      <div class="pn-top">
        <span class="pn-title">Diagnostics</span>
        <div class="pn-counts" id="pn-counts"><span class="co">— No errors</span></div>
      </div>
      <div class="ftabs">
        <button class="ft on" onclick="setFilt('all',this)">All</button>
        <button class="ft"    onclick="setFilt('error',this)">Errors</button>
        <button class="ft"    onclick="setFilt('warning',this)">Warnings</button>
      </div>
    </div>

    <div id="dlist">
      <div class="state">
        <div class="state-lam">λ</div>
        <div class="state-txt">Write some Haskell and compile<br>to see AI-powered feedback.</div>
        <div class="state-sub">Ctrl+S or ▶ to compile</div>
      </div>
    </div>

    <div class="xpbar">
      <div class="xpbar-lbl"><span>Learning progress</span><span id="xp-lev">Beginner</span></div>
      <div class="xpbar-track"><div class="xpbar-fill" id="xp-fill"></div></div>
    </div>
  </aside>

  <!-- Status bar -->
  <footer class="sb">
    <span class="sbi er"><span>Errors</span><span class="v" id="sb-e">0</span></span>
    <div class="sb-sep"></div>
    <span class="sbi wa"><span>Warnings</span><span class="v" id="sb-w">0</span></span>
    <div class="sb-sep"></div>
    <span class="sbi"><span>Debounce</span><span class="v">700ms</span></span>
    <span class="sbi sb-r"><span>AI</span><span class="v">Groq · llama-3.1-8b-instant</span></span>
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
const WS_URL = 'ws://localhost:8765/ws';
const DELAY  = 700;

let editor, ws, timer, activeCard, filt = 'all', allDiags = [], sessionErrs = 0;

const SNIPS = {
  start: `module Main where\n\n-- Edit this code — errors will be explained by AI!\n\nfactorial :: Int -> Int\nfactorial 0 = 1\nfactorial n = n * factorial (n - 1)\n\ngreet :: String -> String\ngreet name = "Hello, " ++ name ++ "!"\n\nmain :: IO ()\nmain = do\n    print (factorial 10)\n    putStrLn (greet "Haskell")\n`,
  type:  `module Main where\n\n-- Type error: Bool used where Int expected\n-- Click the card on the right to see the AI explanation!\n\nadd :: Int -> Int -> Int\nadd x y = x + y\n\nmain :: IO ()\nmain = do\n    let result = add 5 True   -- Bool is not an Int!\n    print result\n`,
  scope: `module Main where\n\n-- Scope error: 'helper' is not defined\n\nmain :: IO ()\nmain = do\n    let xs = [1, 2, 3] :: [Int]\n    print (helper xs)   -- 'helper' is not in scope\n`,
  pat:   `module Main where\n\n-- Non-exhaustive patterns — Nothing case missing\n\nfromJust :: Maybe Int -> Int\nfromJust (Just x) = x   -- warning: incomplete\n\nmain :: IO ()\nmain = print (fromJust (Just 42))\n`,
};

require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
require(['vs/editor/editor.main'], () => {
  monaco.editor.defineTheme('ht', {
    base: 'vs-dark', inherit: true,
    rules: [
      { token: 'comment',  foreground: '3a4558', fontStyle: 'italic' },
      { token: 'keyword',  foreground: '9d7aed' },
      { token: 'string',   foreground: 'f0c07e' },
      { token: 'number',   foreground: '6eb4f0' },
      { token: 'type',     foreground: '7ee8a2' },
      { token: 'constant', foreground: 'f0b96e' },
      { token: 'operator', foreground: '7ab3d4' },
    ],
    colors: {
      'editor.background':              '#0d0f14',
      'editor.foreground':              '#e8ecf0',
      'editorLineNumber.foreground':    '#2a3040',
      'editorLineNumber.activeForeground':'#5a6478',
      'editor.selectionBackground':     '#1c2a3a',
      'editor.lineHighlightBackground': '#111318',
      'editorCursor.foreground':        '#7ee8a2',
      'editorGutter.background':        '#0d0f14',
      'editorError.foreground':         '#f07878',
      'editorWarning.foreground':       '#f0b96e',
      'editorBracketMatch.background':  '#1c2a3a',
      'editorBracketMatch.border':      '#4a9966',
    }
  });

  monaco.languages.register({ id: 'haskell' });
  monaco.languages.setMonarchTokensProvider('haskell', {
    tokenizer: {
      root: [
        [/--.*$/, 'comment'],
        [/\{-/, 'comment', '@bc'],
        [/"([^"\\]|\\.)*"/, 'string'],
        [/'[^'\\]'/, 'string'],
        [/\b(module|where|import|qualified|as|hiding|let|in|do|case|of|if|then|else|data|type|newtype|class|instance|deriving|forall|return|pure|infixl|infixr|infix)\b/, 'keyword'],
        [/\b(True|False|Nothing|Just|Left|Right|IO|Maybe|Either|Int|Integer|Float|Double|Bool|Char|String|Show|Eq|Ord|Num|Functor|Monad)\b/, 'type'],
        [/\b[A-Z][a-zA-Z0-9_']*/, 'type'],
        [/[0-9]+(\.[0-9]+)?/, 'number'],
        [/[=\-><!&|+\-*\/\\^%$@#~?.:]+/, 'operator'],
      ],
      bc: [ [/-\}/, 'comment', '@pop'], [/./, 'comment'] ],
    }
  });

  editor = monaco.editor.create(document.getElementById('editor'), {
    value: SNIPS.start, language: 'haskell', theme: 'ht',
    fontSize: 14, lineHeight: 22,
    fontFamily: "'Space Mono', 'JetBrains Mono', Consolas, monospace",
    fontLigatures: true, minimap: { enabled: false },
    scrollBeyondLastLine: false, automaticLayout: true,
    lineNumbers: 'on', renderWhitespace: 'none',
    bracketPairColorization: { enabled: true },
    padding: { top: 16, bottom: 16 },
    cursorBlinking: 'smooth', cursorSmoothCaretAnimation: 'on',
    smoothScrolling: true, renderLineHighlight: 'gutter',
    overviewRulerLanes: 0, scrollbar: { verticalScrollbarSize: 4, horizontalScrollbarSize: 4 },
  });

  editor.onDidChangeModelContent(() => { clearTimeout(timer); timer = setTimeout(go, DELAY); });
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => { clearTimeout(timer); go(); });
  editor.onDidChangeCursorPosition(e => {
    const ln = e.position.lineNumber;
    document.querySelectorAll('.dc').forEach(c => {
      if (ln >= +c.dataset.sl && ln <= +c.dataset.el && c !== activeCard) activate(c, false);
    });
  });

  connect();
});

function connect() {
  setB('Connecting', '');
  try { ws = new WebSocket(WS_URL); } catch { setB('Error', 'err'); return; }
  ws.onopen  = () => { setB('Connected', 'connected'); document.getElementById('runbtn').disabled = false; go(); };
  ws.onclose = () => { setB('Offline', 'err'); document.getElementById('runbtn').disabled = true; setTimeout(connect, 3000); };
  ws.onerror = () => setB('Error', 'err');
  ws.onmessage = e => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if (m.type === 'diagnostics') { setB('Connected','connected'); flash(m.diagnostics.length===0); render(m.diagnostics||[]); }
    else if (m.type === 'error') setB('Server Error','err');
  };
}

function go() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  setB('Compiling…','compiling');
  ws.send(JSON.stringify({ type:'compile', source: editor.getValue(), uri:'web://editor' }));
}

function render(diags) {
  allDiags = diags;
  activeCard = null;
  const errs  = diags.filter(d=>d.severity==='error').length;
  const warns = diags.filter(d=>d.severity==='warning').length;
  document.getElementById('sb-e').textContent = errs;
  document.getElementById('sb-w').textContent = warns;
  const pc = document.getElementById('pn-counts');
  pc.innerHTML = errs||warns
    ? [(errs?`<span class="ce">${errs}E</span>`:''), (warns?`<span class="cw">${warns}W</span>`:'')].filter(Boolean).join('')
    : '<span class="co">✓ All clear</span>';
  if (errs > 0) { sessionErrs = Math.min(sessionErrs + errs, 25); xp(sessionErrs/25); }
  if (editor) {
    monaco.editor.setModelMarkers(editor.getModel(), 'ghc', diags.map(d => ({
      severity:        d.severity==='error' ? monaco.MarkerSeverity.Error : d.severity==='warning' ? monaco.MarkerSeverity.Warning : monaco.MarkerSeverity.Info,
      message:         d.message,
      startLineNumber: d.startLine, startColumn: d.startCol,
      endLineNumber:   d.endLine,   endColumn: Math.max(d.endCol, d.startCol+1),
    })));
  }
  renderList(diags);
}

function renderList(diags) {
  const list = document.getElementById('dlist');
  const filtered = filt==='all' ? diags : diags.filter(d=>d.severity===filt);
  if (filtered.length===0) {
    list.innerHTML = diags.length===0
      ? `<div class="state"><div class="state-ok-mark">✓</div><div class="state-ok">Compiles cleanly</div><div class="state-sub">No errors or warnings</div></div>`
      : `<div class="state"><div class="state-lam">λ</div><div class="state-txt">No ${filt}s to show.</div></div>`;
    return;
  }
  list.innerHTML = '';
  filtered.forEach(d => {
    const c = document.createElement('div');
    const sc = d.severity==='error'?'se':d.severity==='warning'?'sw':'si';
    c.className = `dc ${sc}`;
    c.dataset.sl = d.startLine; c.dataset.el = d.endLine;
    const hasAI = d.explanation || d.hint;
    c.innerHTML = `
      <div class="dc-row">
        <div class="dc-stripe"></div>
        <div class="dc-body">
          <div class="dc-meta">
            <span class="dc-sev">${d.severity}</span>
            <span class="dc-loc">line <span class="ln">${d.startLine}</span> col <span class="ln">${d.startCol}</span></span>
          </div>
          <div class="dc-msg">${esc(d.message)}</div>
        </div>
      </div>
      ${hasAI?`<div class="dc-ai"><div class="dc-ai-in">
        ${d.explanation?`<div class="ai-blk"><div class="ai-lbl exp">💡 What this means</div><div class="ai-txt">${esc(d.explanation)}</div></div>`:''}
        ${d.hint?`<div class="ai-blk"><div class="ai-lbl hnt">🔑 Hint</div><div class="ai-txt">${esc(d.hint)}</div></div>`:''}
      </div></div>`:''}`;
    c.addEventListener('click', () => { activate(c, true); editor?.revealLineInCenter(d.startLine); editor?.setPosition({lineNumber:d.startLine,column:d.startCol}); editor?.focus(); });
    list.appendChild(c);
  });
}

function activate(c, scroll) {
  if (activeCard) activeCard.classList.remove('active');
  activeCard = c; c.classList.add('active');
  if (scroll) c.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

function setFilt(f, btn) {
  filt = f;
  document.querySelectorAll('.ft').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  renderList(allDiags);
}

function loadSnip(k, btn) {
  if (!editor) return;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  editor.setValue(SNIPS[k]);
  editor.setPosition({lineNumber:1,column:1});
  editor.focus();
}

function xp(r) {
  document.getElementById('xp-fill').style.width = `${Math.round(r*100)}%`;
  const lvls = ['Beginner','Novice','Intermediate','Advanced','Expert'];
  document.getElementById('xp-lev').textContent = lvls[Math.min(Math.floor(r*(lvls.length-1)), lvls.length-1)];
}

function flash(ok) {
  const el = document.getElementById('flash');
  el.style.setProperty('--accent', ok ? '#7ee8a2' : '#f07878');
  el.classList.remove('go'); void el.offsetWidth; el.classList.add('go');
  setTimeout(()=>el.classList.remove('go'), 700);
}

function setB(txt, cls) {
  document.getElementById('badge').className = `badge ${cls}`;
  document.getElementById('badge-txt').textContent = txt;
}

function esc(s) { return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }

document.getElementById('runbtn').addEventListener('click', () => { clearTimeout(timer); go(); });
</script>
</body>
</html>
